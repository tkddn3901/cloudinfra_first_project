<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>강남구 버스 혼잡도 대시보드</title>
  <style>
    body {
      font-family: "Apple SD Gothic Neo", sans-serif;
      margin: 40px;
      color: #333;
    }
    h1 {
      margin-bottom: 5px;
      color: #a52323;
    }
    .meta {
      font-size: 0.9em;
      color: #666;
      margin-bottom: 20px;
    }
    table {
      border-collapse: collapse;
      width: 320px;
    }
    th, td {
      border: 1px solid #bbb;
      padding: 10px 15px;
      text-align: center;
    }
    th {
      background-color: #ffe6e6;
      font-weight: bold;
    }
    td {
      background-color: #fafafa;
    }
    footer {
      margin-top: 30px;
      font-size: 0.8em;
      color: #999;
    }
  </style>
</head>
<body>
  <h1>강남구 버스 혼잡도 대시보드</h1>
  <div class="meta">
    조회 날짜: {{ date }} &nbsp;|&nbsp; 호스트 IP: {{ host_ip }}
  </div>
  <table>
    <tr>
      <th>지역명</th>
      <th>레코드 수</th>
    </tr>
    <tr>
      <td>강남구</td>
      <td>{{ count }}</td>
    </tr>
  </table>
  <footer>
    &copy; {{ date }} 교통정보 시스템
  </footer>
</body>
</html>
