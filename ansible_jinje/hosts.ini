# ─────────────────────────────────────────────────────────
# bugteam 인프라 인벤토리
# Terraform 배포 후 각 그룹의 IP를 실제 값으로 교체할 것
# ─────────────────────────────────────────────────────────

# MGMT EC2 (Amazon Linux, Public Subnet) - Terraform 배포 후 실제 IP로 교체
[mgmt]
localhost ansible_connection=local ansible_user=ec2-user

# ── 웹 서버 ───────────────────────────────────────────────

# 은평구 Amazon Linux EC2
[eunpyeong]
10.0.2.30 ansible_user=user1

# 강남구 Ubuntu EC2
[gangnam]
10.0.2.10 ansible_user=ubuntu

# web 통합 그룹 (ec2_bootstrap.yml, web_setup.yml 에서 사용)
[web:children]
eunpyeong
gangnam

# ── DB 서버 ───────────────────────────────────────────────

# DB EC2 (Ubuntu / PostgreSQL)
[db]
10.0.3.158 ansible_user=user1

# ── 모니터링 서버 ─────────────────────────────────────────

# VMware Rocky Linux (Prometheus + Grafana)
# EC2 가 아니므로 ec2_bootstrap.yml 대상에서 제외됨
[monitoring]
172.16.1.10 ansible_user=user1
