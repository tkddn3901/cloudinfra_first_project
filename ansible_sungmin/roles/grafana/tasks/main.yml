---
- name: "플랫폼 정보 수집"
  ansible.builtin.setup:
    gather_subset: min


- name: "필수 패키지 설치(RedHat 계열)"
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.dnf:
    name:
      - wget
      - gnupg2
    state: present


- name: "Grafana YUM 저장소 등록 (RedHat 계열)"
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/grafana.repo
    content: |
      [grafana]
      name=grafana
      baseurl=https://rpm.grafana.com
      repo_gpgcheck=1
      enabled=1
      gpgcheck=1
      gpgkey=https://rpm.grafana.com/gpg.key
      sslverify=1
      sslcacert=/etc/pki/tls/certs/ca-bundle.crt


- name: "Grafana 설치 (RedHat 계열)"
  when: ansible_facts['os_family'] == "RedHat"
  ansible.builtin.dnf:
    name: grafana
    state: present


- name: "필수 패키지 설치(Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - wget
      - gnupg2
    state: present
    update_cache: yes


- name: "Grafana GPG 키 등록 (Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present


- name: "Grafana APT 저장소 추가 (Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt_repository:
    repo: "deb https://packages.grafana.com/oss/deb stable main"
    state: present
    filename: grafana


- name: "Grafana 설치 (Debian 계열)"
  when: ansible_facts['os_family'] == "Debian"
  ansible.builtin.apt:
    name: grafana
    state: present
    update_cache: yes


- name: "Grafana 서비스 시작 및 부팅 시 자동실행"
  ansible.builtin.systemd:
    name: grafana-server
    state: started
    enabled: yes