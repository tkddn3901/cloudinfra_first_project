# monitor_setup.yml (roles 사용 버전)
---
- name: "Node Exporter 설치 (collection 활용)"
  hosts: all
  become: yes

  tasks:
    - name: "필수 라이브러리 설치 (Debian)"
      apt:
        name: [unzip, tar, python3-apt]
        update_cache: yes
        state: present
      when: ansible_os_family == "Debian"

    - name: "필수 라이브러리 설치 (RedHat)"
      dnf:
        name: [tar, gzip]
        state: present
      when: ansible_os_family == "RedHat"

    - name: "Node Exporter 설치 및 서비스 등록"
      include_role:
        name: prometheus.prometheus.node_exporter
      vars:
        node_exporter_version: "1.7.0"
        # 로컬 캐시 경로를 본인 홈 디렉토리로 지정 (권한 문제 회피)
        _common_local_cache_path: "{{ lookup('env', 'HOME') }}/.ansible_cache/node_exporter"